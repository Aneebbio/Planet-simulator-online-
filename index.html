<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD CORE v1.9.0 | SATELLITE COMMAND</title>
    <style>
        :root { --bg: #010103; --accent: #00d2d3; --rare: #a55eea; --danger: #ff4757; --fungus: #2ecc71; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; margin: 0; overflow: hidden; }

        /* Scanning Line Effect */
        body::after {
            content: ""; position: fixed; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); transition: opacity 0.5s; }
        .hidden { display: none !important; opacity: 0; }

        /* Grid / Satellite Map */
        #grid-container { 
            display: grid; grid-template-columns: repeat(3, 160px); gap: 12px; 
            padding: 20px; border: 1px solid #222; background: rgba(0,0,0,0.8);
        }
        .tile { 
            width: 160px; height: 160px; background-size: cover; background-position: center; 
            border: 1px solid #333; position: relative; transition: 0.3s;
        }
        .tile.player { border: 2px solid var(--accent); box-shadow: inset 0 0 20px var(--accent); }
        .tile.player::after { content: "🛰"; position: absolute; top: 5px; right: 5px; font-size: 0.8rem; }
        
        .tile.rival { filter: sepia(1) hue-rotate(90deg) brightness(0.7); border: 1px solid var(--fungus); }
        .tile.rival::after { 
            content: "🍄"; position: absolute; inset: 0; display: flex; align-items: center; 
            justify-content: center; font-size: 3rem; background: rgba(0,30,0,0.5); 
        }

        /* UI Elements */
        #sidebar { width: 320px; background: #08080c; border-left: 2px solid #1a1a1f; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .node { background: #111; border: 1px solid #333; padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .buy-btn { 
            background: var(--accent); color: #000; border: none; padding: 10px; 
            font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;
        }
        .buy-btn:hover { background: #fff; }
        .buy-btn:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* Supernova / Whiteout */
        #white-out { background: #fff; color: #000; z-index: 9999; padding: 10%; display: flex; flex-direction: column; }
        #final-msg { font-size: 1.8rem; line-height: 1.6; font-weight: bold; white-space: pre-wrap; }

        #stabilize-ui { z-index: 200; background: rgba(255,0,0,0.2); backdrop-filter: blur(5px); }

        /* Ad Container Styling */
        #ad-box { min-height: 250px; background: #000; border: 1px dashed #444; margin-top: 10px; padding: 5px; text-align: center; overflow: hidden; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen">
        <div style="width: 90%; max-width: 1100px; display: flex; gap: 40px;">
            <div style="flex: 1;">
                <h1 style="font-size: 3rem; margin: 0; color: var(--accent);">GOD_CORE</h1>
                <p style="color: #666; margin-bottom: 20px;">v1.9.0 FINAL STABLE</p>
                <h2 id="meta-isotopes" style="color: var(--rare); font-size: 2rem;">0 ⚛</h2>
                <button class="buy-btn" style="padding: 20px; font-size: 1.2rem;" onclick="startGame()">INITIATE LINK</button>
                <div id="addon-shop" style="margin-top: 30px;"></div>
            </div>
            <div style="flex: 1;">
                <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px;">EVOLUTION TREE</h3>
                <div id="skill-tree"></div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="stabilize-ui" class="screen hidden">
            <button class="buy-btn" style="width: 300px; height: 100px; font-size: 1.5rem;" onclick="stabilize()">RE-SYNC SIGNAL</button>
        </div>
        
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <h2 id="era-name" style="letter-spacing: 8px; color: var(--accent);">ARCHEAN EARTH</h2>
            <div id="grid-container"></div>
            <div style="margin-top: 25px; display: flex; gap: 15px;">
                <button class="buy-btn" style="width: 100px;" onclick="nav(-1)">◄ ERA</button>
                <button class="buy-btn" style="width: 100px;" onclick="nav(1)">ERA ►</button>
            </div>
        </div>

        <div id="sidebar">
            <div class="node"><small style="color:var(--accent)">CHRONO_REMAINING</small><div id="ui-year" style="font-size: 2rem;">30</div></div>
            <div class="node"><small style="color:var(--accent)">BIO_MASS</small><div id="ui-pop" style="font-size: 2rem;">0</div></div>
            <div class="node"><small style="color:var(--accent)">DIVINE_FAITH</small><div id="ui-faith" style="font-size: 2rem;">0</div></div>
            
            <div id="ad-box" class="node">
                <small style="color: #444; display: block; margin-bottom: 5px;">SPONSORED UPLINK</small>
                <script async="async" data-cfasync="false" src="https://pl28773503.effectivegatecpm.com/900a963ba8053c59fa04ff02450d4e12/invoke.js"></script>
                <div id="container-900a963ba8053c59fa04ff02450d4e12"></div>
            </div>

            <div id="event-log" style="flex: 1; margin-top: 15px; overflow: hidden; font-size: 0.8rem; opacity: 0.8;"></div>
            <button class="buy-btn" style="background:var(--danger); color:#fff; height: 60px; margin-top: 10px;" onclick="smite()">PURGE BLIGHT (50 F)</button>
        </div>
    </div>

    <div id="white-out" class="screen hidden">
        <div id="final-msg"></div>
    </div>

    <script>
        // --- DATA ENGINE ---
        const ERAS = [
            { name: "ARCHEAN EARTH", url: "https://images.unsplash.com/photo-1464802686167-b939a67e0621?w=600" },
            { name: "PANGEA", url: "https://images.unsplash.com/photo-1581084324492-c8076f130f86?w=600" },
            { name: "ICE AGE", url: "https://images.unsplash.com/photo-1516934023933-90d2e5f564f8?w=600" },
            { name: "ANTHROPOCENE", url: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=600" }
        ];

        const SKILLS = [
            { id: 'life', name: 'Rapid Mitosis', icon: '🧬', cost: 10 },
            { id: 'tech', name: 'AI Uplink', icon: '📡', cost: 15 },
            { id: 'time', name: 'Chrono Anchor', icon: '⌛', cost: 25 }
        ];

        const ADDONS = [
            { id: 'auto_smite', name: 'Orbital Laser', desc: 'Auto-purges fungus every 4s.' },
            { id: 'luck_core', name: 'Resource Probe', desc: 'Double Isotopes from events.' }
        ];

        // --- STATE MANAGEMENT ---
        let meta = JSON.parse(localStorage.getItem('god_core_v190')) || {
            isotopes: 0,
            levels: { life: 0, tech: 0, time: 0 },
            addons: [],
            addonCount: 0
        };

        let state = { active: false, year: 0, maxYear: 30, pop: 10, faith: 0, chunk: 0, chunks: [], stab: false };

        const save = () => localStorage.setItem('god_core_v190', JSON.stringify(meta));

        // --- CORE LOGIC ---
        window.startGame = () => {
            state.active = true; state.year = 0; state.pop = 10; state.faith = 20; state.chunk = 0;
            state.maxYear = 30 + (meta.levels.time * 10);
            state.chunks = Array.from({length: 4}, () => Array(9).fill(0));
            state.chunks[0][4] = 1; 
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            gameLoop();
        };

        function gameLoop() {
            if(!state.active) return;
            state.year++;
            state.faith += (state.pop / 15) + (meta.levels.tech * 5);
            
            // ASCENSION CHECK
            if(state.pop >= 10000 && state.faith >= 10000) {
                triggerSupernova();
                return;
            }

            // Expansion
            if(Math.random() < (0.05 + meta.levels.life * 0.05)) expand(1);
            if(Math.random() < 0.15) expand(2);
            
            // Addons
            if(meta.addons.includes('auto_smite') && state.year % 4 === 0) {
                let fIdx = state.chunks[state.chunk].indexOf(2);
                if(fIdx !== -1) state.chunks[state.chunk][fIdx] = 0;
            }

            if(Math.random() < 0.1) triggerEvent();

            updateUI();
            renderGrid();

            if(state.year >= state.maxYear) {
                let gain = Math.floor(state.pop / 50) + 1;
                meta.isotopes += gain; save();
                location.reload(); 
            } else {
                setTimeout(gameLoop, 1000);
            }
        }

        function expand(type) {
            const empties = state.chunks[state.chunk].map((t,i) => t === 0 ? i : -1).filter(i => i !== -1);
            if(empties.length) {
                state.chunks[state.chunk][empties[Math.floor(Math.random()*empties.length)]] = type;
                if(type === 1) state.pop += 15 + (meta.levels.life * 10);
            }
        }

        function triggerEvent() {
            const log = document.getElementById('event-log');
            if(Math.random() > 0.8) {
                state.stab = true;
                document.getElementById('stabilize-ui').classList.remove('hidden');
                setTimeout(() => { if(state.stab) { state.pop -= 40; log.innerHTML = `<div style="color:red">SYNC ERROR: Pop Lost</div>` + log.innerHTML; }}, 2500);
            } else {
                let gain = meta.addons.includes('luck_core') ? 4 : 2;
                meta.isotopes += gain;
                log.innerHTML = `<div style="color:var(--rare)">FEED: Found ${gain} Isotope</div>` + log.innerHTML;
            }
        }

        function triggerSupernova() {
            state.active = false;
            document.getElementById('white-out').classList.remove('hidden');
            const msg = "MESSAGE FROM UNKNOWN:\n\nSynchronization successful...\nAnalyzing chronology...\n\nWarning: Earth was not evolving.\nIt was reversing.\n\nYou have returned to the spark.\nThis is not a mission.\nThis is a Supernova.\n\nThanks for playing.";
            let i = 0;
            function type() {
                if(i < msg.length) {
                    document.getElementById('final-msg').innerHTML += msg.charAt(i);
                    i++; setTimeout(type, 50);
                }
            }
            setTimeout(type, 1500);
        }

        // --- UI & NAVIGATION ---
        window.buySkill = (id) => {
            const s = SKILLS.find(x => x.id === id);
            const cost = s.cost * (meta.levels[id] + 1);
            if(meta.isotopes >= cost) { meta.isotopes -= cost; meta.levels[id]++; save(); updateMenu(); }
        };

        window.buyAddon = (id) => {
            const cost = 100 * Math.pow(10, meta.addonCount);
            if(meta.isotopes >= cost && !meta.addons.includes(id)) {
                meta.isotopes -= cost; meta.addons.push(id); meta.addonCount++; save(); updateMenu();
            }
        };

        window.nav = (dir) => {
            state.chunk = Math.max(0, Math.min(3, state.chunk + dir));
            document.getElementById('era-name').innerText = ERAS[state.chunk].name;
            renderGrid();
        };

        window.smite = () => {
            if(state.faith >= 50) {
                state.faith -= 50;
                state.chunks[state.chunk] = state.chunks[state.chunk].map(t => t === 2 ? 0 : t);
                renderGrid();
            }
        };

        window.stabilize = () => { state.stab = false; document.getElementById('stabilize-ui').classList.add('hidden'); };

        function renderGrid() {
            const g = document.getElementById('grid-container'); g.innerHTML = '';
            state.chunks[state.chunk].forEach(t => {
                const d = document.createElement('div');
                d.className = `tile ${t===1?'player':(t===2?'rival':'empty')}`;
                d.style.backgroundImage = `url(${ERAS[state.chunk].url})`;
                g.appendChild(d);
            });
        }

        function updateUI() {
            document.getElementById('ui-year').innerText = (state.maxYear - state.year);
            document.getElementById('ui-pop').innerText = Math.floor(state.pop);
            document.getElementById('ui-faith').innerText = Math.floor(state.faith);
        }

        function updateMenu() {
            document.getElementById('meta-isotopes').innerText = meta.isotopes + " ⚛";
            const tree = document.getElementById('skill-tree'); tree.innerHTML = '';
            SKILLS.forEach(s => {
                let lv = meta.levels[s.id]; let cost = s.cost * (lv + 1);
                tree.innerHTML += `<div class="node"><div>${s.icon} ${s.name}</div><button class="buy-btn" ${meta.isotopes<cost?'disabled':''} onclick="buySkill('${s.id}')">LV ${lv} (${cost}⚛)</button></div>`;
            });
            const shop = document.getElementById('addon-shop'); shop.innerHTML = '<h3>MODULES</h3>';
            let aCost = 100 * Math.pow(10, meta.addonCount);
            ADDONS.forEach(a => {
                let owned = meta.addons.includes(a.id);
                shop.innerHTML += `<div class="node" style="${owned?'opacity:0.4':''}"><b>${a.name}</b><button class="buy-btn" ${owned||meta.isotopes<aCost?'disabled':''} onclick="buyAddon('${a.id}')">${owned?'INSTALLED':aCost+'⚛'}</button></div>`;
            });
        }

        updateMenu();
    </script>
</body>
</html>
