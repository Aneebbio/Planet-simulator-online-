<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VOID GOD — IMMORTAL EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --c0: #02010a;
  --c1: #0c0a1e;
  --c2: #181430;
  --c3: #251e4a;
  --acc: #c084fc;
  --acc2: #818cf8;
  --gold: #fbbf24;
  --cyan: #22d3ee;
  --red: #f43f5e;
  --green: #4ade80;
  --txt: #e2e8f0;
  --txt2: #94a3b8;
  --txt3: #475569;
  --glow: rgba(192,132,252,0.4);
  --glow2: rgba(34,211,238,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--c0);color:var(--txt);
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(129,140,248,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%, rgba(192,132,252,0.07) 0%, transparent 60%);
}

/* NOISE OVERLAY */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1;opacity:0.35;
}

/* ── HEADER ── */
#hdr{
  position:sticky;top:0;z-index:500;
  background:rgba(2,1,10,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(192,132,252,0.2);
  padding:0 16px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
#hdr-title{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:11px;
  letter-spacing:3px;color:var(--acc);
  text-shadow:0 0 20px var(--acc);
}
#res-row{display:flex;gap:16px;align-items:center;}
.res{display:flex;align-items:center;gap:6px;font-size:11px;}
.res-icon{width:8px;height:8px;border-radius:50%;}
.ri-iso{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.ri-void{background:var(--acc);box-shadow:0 0 8px var(--acc);}
.res-val{color:var(--txt);font-weight:bold;}
#ips-display{font-size:9px;color:var(--txt3);}
#save-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);transition:0.3s;}
#save-dot.pulse{background:var(--green);box-shadow:0 0 8px var(--green);}

/* ── NAV ── */
#nav{
  display:flex;background:rgba(12,10,30,0.9);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;top:52px;z-index:499;
}
.ntab{
  flex:1;padding:10px 4px;font-size:10px;letter-spacing:1.5px;
  color:var(--txt3);background:none;border:none;cursor:pointer;
  font-family:'Share Tech Mono',monospace;text-transform:uppercase;
  border-bottom:2px solid transparent;transition:0.2s;
}
.ntab:hover{color:var(--txt2);}
.ntab.on{color:var(--acc);border-bottom-color:var(--acc);text-shadow:0 0 12px var(--acc);}
.ntab .ntab-icon{font-size:14px;display:block;margin-bottom:2px;}

/* ── SCREENS ── */
.screen{display:none;padding:16px;padding-bottom:120px;animation:fadeUp 0.25s ease;}
.screen.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── WORLD SCREEN ── */
#planet-name{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;
  letter-spacing:4px;text-align:center;
  cursor:pointer;margin-bottom:4px;transition:0.3s;
}
#env-line{text-align:center;font-size:9px;color:var(--txt3);letter-spacing:2px;margin-bottom:20px;}

/* PLANET VISUAL */
#planet-wrap{
  position:relative;width:200px;height:200px;margin:0 auto 24px;
}
#planet-svg{width:200px;height:200px;border-radius:50%;overflow:hidden;position:relative;z-index:2;}
#planet-glow{
  position:absolute;inset:-20px;border-radius:50%;z-index:1;
  background:radial-gradient(circle, transparent 35%, rgba(192,132,252,0.15) 60%, transparent 80%);
  animation:glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse{from{opacity:0.6;}to{opacity:1;}}
.orbit-ring{
  position:absolute;border-radius:50%;border:1px dashed;
  animation:spinOrbit linear infinite;pointer-events:none;
}
.sat-dot{
  position:absolute;top:50%;left:50%;width:6px;height:6px;
  border-radius:50%;transform-origin:center center;
}
@keyframes spinOrbit{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* GRID */
#grid-wrap{
  position:relative;width:288px;margin:0 auto;
}
#grid{
  display:grid;grid-template-columns:repeat(9,1fr);
  gap:2px;width:288px;padding:4px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(192,132,252,0.15);
  border-radius:8px;
}
.tile{
  width:29px;height:29px;border-radius:3px;
  background:rgba(255,255,255,0.02);transition:0.3s;
  position:relative;
}
.tile-void{background:rgba(138,43,226,0.12);}
.tile-rock{background:linear-gradient(135deg,#3d3550,#2a1f40);}
.tile-fire{background:linear-gradient(135deg,#7c1d1d,#c2410c);}
.tile-ocean{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);}
.tile-grass{background:linear-gradient(135deg,#14532d,#166534);}
.tile-city{
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  box-shadow:inset 0 0 4px rgba(192,132,252,0.3);
}
.tile-city::after{
  content:'';position:absolute;bottom:2px;left:2px;right:2px;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  opacity:0.5;animation:cityGlow 2s ease infinite alternate;
}
@keyframes cityGlow{from{opacity:0.2;}to{opacity:0.7;}}
.tile-ghost{
  background:radial-gradient(circle,rgba(192,132,252,0.6),rgba(192,132,252,0.1)) !important;
  cursor:pointer;z-index:10;animation:ghostBeat 0.8s ease-in-out infinite alternate;
}
@keyframes ghostBeat{from{box-shadow:0 0 6px var(--acc);transform:scale(0.85);}to{box-shadow:0 0 16px var(--acc),0 0 30px rgba(192,132,252,0.4);transform:scale(1.1);}}

/* DAY BUTTON */
#day-btn-wrap{text-align:center;margin-top:20px;}
#day-btn{
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #1e1640, #0c0a1e);
  border:2px solid rgba(192,132,252,0.5);
  color:var(--txt);cursor:pointer;position:relative;
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:2px;transition:0.2s;
  box-shadow:0 0 20px rgba(192,132,252,0.15),inset 0 0 30px rgba(0,0,0,0.5);
}
#day-btn:hover{border-color:var(--acc);box-shadow:0 0 30px var(--glow);}
#day-btn:active{transform:scale(0.96);}
#day-num{font-size:22px;font-weight:900;color:var(--acc);display:block;margin-bottom:2px;}
#auto-progress{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(var(--acc2) var(--pct,0%), transparent 0%);
  opacity:0.7;transition:--pct 0.1s;mask:radial-gradient(circle at center, transparent 48%, black 50%);
  -webkit-mask:radial-gradient(circle at center, transparent 48%, black 50%);
}
#harvest-preview{font-size:9px;color:var(--txt3);margin-top:8px;}
#harvest-preview b{color:var(--gold);}

/* ── SKILL TREE ── */
#skilltree-wrap{max-width:420px;margin:0 auto;}
.skill-category{margin-bottom:24px;}
.skill-cat-title{
  font-size:9px;letter-spacing:3px;color:var(--txt3);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding-bottom:6px;margin-bottom:12px;text-transform:uppercase;
}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.skill-card{
  background:rgba(12,10,30,0.8);border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;padding:12px;transition:0.2s;cursor:default;
  position:relative;overflow:hidden;
}
.skill-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 60%,rgba(192,132,252,0.04));
  pointer-events:none;
}
.skill-card.can-buy{border-color:rgba(192,132,252,0.3);cursor:pointer;}
.skill-card.can-buy:hover{border-color:var(--acc);background:rgba(20,16,50,0.9);transform:translateY(-1px);}
.skill-card.maxed{border-color:rgba(251,191,36,0.3);opacity:0.7;}
.skill-card.locked{opacity:0.3;}
.sk-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.sk-name{font-size:11px;font-weight:600;color:var(--txt);}
.sk-lvl{font-size:9px;color:var(--txt3);}
.sk-lvl.max{color:var(--gold);}
.sk-desc{font-size:9px;color:var(--txt3);line-height:1.5;margin-bottom:8px;}
.sk-bar{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin-bottom:8px;}
.sk-bar-fill{height:100%;border-radius:1px;background:var(--acc);transition:0.3s;}
.sk-cost{font-size:10px;color:var(--cyan);}
.sk-cost.cant{color:var(--red);}
.sk-cost.maxed{color:var(--gold);}
.sk-bonus{font-size:9px;color:var(--green);margin-top:2px;}
.sk-icon{font-size:18px;margin-bottom:4px;display:block;}
.sk-tag{
  font-size:8px;padding:1px 4px;border-radius:3px;
  background:rgba(192,132,252,0.1);color:var(--acc);letter-spacing:1px;
}

/* ── PRESTIGE / VOID ── */
#void-screen-wrap{max-width:420px;margin:0 auto;}
.void-big-card{
  background:linear-gradient(135deg,rgba(30,20,60,0.9),rgba(12,10,30,0.9));
  border:1px solid rgba(192,132,252,0.4);border-radius:12px;padding:20px;
  text-align:center;margin-bottom:20px;
  box-shadow:0 0 40px rgba(192,132,252,0.1);
}
.void-big-card h3{
  font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;
  color:var(--acc);margin-bottom:12px;
}
.void-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.vs-item{background:rgba(0,0,0,0.3);border-radius:6px;padding:8px;}
.vs-label{font-size:8px;color:var(--txt3);letter-spacing:1px;}
.vs-val{font-size:16px;font-weight:bold;color:var(--txt);margin-top:2px;}
.prestige-btn{
  width:100%;padding:14px;border-radius:8px;border:2px solid var(--acc);
  background:linear-gradient(135deg,rgba(192,132,252,0.15),rgba(129,140,248,0.1));
  color:var(--acc);font-family:'Orbitron',sans-serif;font-size:12px;
  letter-spacing:2px;cursor:pointer;transition:0.2s;font-weight:700;
}
.prestige-btn:hover{background:linear-gradient(135deg,rgba(192,132,252,0.25),rgba(129,140,248,0.2));box-shadow:0 0 20px var(--glow);}
.prestige-btn:disabled{opacity:0.3;cursor:default;}

/* VOID SHOP */
.void-shop-title{font-size:9px;letter-spacing:3px;color:var(--txt3);margin-bottom:12px;}
.void-upgrade{
  background:rgba(12,10,30,0.8);border:1px solid rgba(192,132,252,0.2);
  border-radius:8px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center;
}
.vu-icon{font-size:24px;flex-shrink:0;}
.vu-info{flex:1;}
.vu-name{font-size:11px;font-weight:600;margin-bottom:2px;}
.vu-desc{font-size:9px;color:var(--txt3);line-height:1.4;}
.vu-buy{
  background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.4);
  color:var(--acc);font-family:'Share Tech Mono',monospace;font-size:10px;
  padding:6px 12px;border-radius:5px;cursor:pointer;transition:0.2s;white-space:nowrap;
}
.vu-buy:hover{background:rgba(192,132,252,0.25);}
.vu-buy:disabled{opacity:0.2;cursor:default;}
.vu-buy.owned{background:rgba(251,191,36,0.1);border-color:var(--gold);color:var(--gold);}

/* ── STATS / LOG ── */
#stats-wrap{max-width:420px;margin:0 auto;}
.stat-panel{
  background:rgba(12,10,30,0.8);border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;padding:16px;margin-bottom:12px;
}
.stat-panel h4{font-size:9px;letter-spacing:3px;color:var(--txt3);margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:6px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-item{background:rgba(0,0,0,0.2);border-radius:6px;padding:8px;}
.stat-lbl{font-size:8px;color:var(--txt3);letter-spacing:1px;}
.stat-val{font-size:14px;color:var(--txt);margin-top:2px;}

.log-entry{
  font-size:9px;color:var(--txt3);padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  display:flex;gap:8px;
}
.log-time{color:var(--txt3);opacity:0.5;white-space:nowrap;}
.log-msg{flex:1;}
.log-highlight{color:var(--gold);}
.log-error{color:var(--red);}
.log-good{color:var(--green);}

/* CONTROLS */
.ctrl-row{display:flex;gap:8px;margin-bottom:8px;}
.ctrl-btn{
  flex:1;padding:10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);color:var(--txt2);
  font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:0.2s;
}
.ctrl-btn:hover{border-color:rgba(192,132,252,0.3);color:var(--txt);}
.ctrl-btn.danger{border-color:rgba(244,63,94,0.3);color:var(--red);}
.ctrl-btn.danger:hover{background:rgba(244,63,94,0.1);}

/* NOTIFICATIONS */
#notif-wrap{position:fixed;top:60px;right:12px;z-index:900;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.notif{
  background:rgba(12,10,30,0.95);border:1px solid rgba(192,132,252,0.3);
  border-radius:6px;padding:8px 14px;font-size:10px;letter-spacing:0.5px;
  animation:notifIn 0.3s ease,notifOut 0.3s ease 2.5s;
  opacity:0;animation-fill-mode:forwards;box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
@keyframes notifIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@keyframes notifOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(20px);}}

/* FLASH */
#flash{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0;}
@keyframes novaFlash{0%{opacity:0.8;}100%{opacity:0;}}

/* MILESTONE BANNER */
#milestone-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:800;
  background:linear-gradient(90deg,transparent,rgba(192,132,252,0.15) 20%,rgba(192,132,252,0.15) 80%,transparent);
  border-top:1px solid rgba(192,132,252,0.3);padding:10px;text-align:center;
  font-size:11px;letter-spacing:2px;color:var(--acc);
  transform:translateY(100%);transition:0.5s;
}
#milestone-banner.show{transform:translateY(0);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(192,132,252,0.3);border-radius:2px;}

/* RESPONSIVE */
@media(max-width:360px){
  #planet-wrap{width:160px;height:160px;}
  #planet-svg{width:160px;height:160px;}
  #grid{width:250px;grid-template-columns:repeat(9,1fr);}
  .tile{width:24px;height:24px;}
}
</style>
</head>
<body>

<div id="flash"></div>
<div id="notif-wrap"></div>
<div id="milestone-banner">✦ ACHIEVEMENT UNLOCKED ✦</div>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-title">VOID GOD</div>
  <div id="res-row">
    <div class="res"><div class="res-icon ri-iso"></div><div><div class="res-val" id="iso-disp">0</div><div id="ips-display">0/s</div></div></div>
    <div class="res"><div class="res-icon ri-void"></div><span class="res-val" id="void-disp">0</span></div>
    <div id="save-dot"></div>
  </div>
</div>

<!-- NAV -->
<nav id="nav">
  <button class="ntab on" onclick="tab('world')" id="nt-world"><span class="ntab-icon">🌍</span>ORBIT</button>
  <button class="ntab" onclick="tab('skills')" id="nt-skills"><span class="ntab-icon">🧬</span>EVOLVE</button>
  <button class="ntab" onclick="tab('void')" id="nt-void"><span class="ntab-icon">🌀</span>VOID</button>
  <button class="ntab" onclick="tab('stats')" id="nt-stats"><span class="ntab-icon">📡</span>DATA</button>
</nav>

<!-- WORLD -->
<div class="screen on" id="screen-world">
  <div id="planet-name" onclick="renamePlanet()">NEW WORLD</div>
  <div id="env-line">SYSTEM ONLINE — SCANNING...</div>

  <div id="planet-wrap">
    <div id="planet-glow"></div>
    <canvas id="planet-canvas" width="200" height="200" style="border-radius:50%;position:relative;z-index:2;"></canvas>
    <div id="orbit-rings"></div>
  </div>

  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <div id="day-btn-wrap">
    <button id="day-btn" onclick="advance()">
      <div id="auto-progress"></div>
      <span id="day-num">1</span>
      <span>/ 20</span>
    </button>
    <div id="harvest-preview">Next harvest: <b id="harvest-est">0</b> ISO</div>
  </div>
</div>

<!-- SKILLS -->
<div class="screen" id="screen-skills">
  <div id="skilltree-wrap"></div>
</div>

<!-- VOID -->
<div class="screen" id="screen-void">
  <div id="void-screen-wrap"></div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div id="stats-wrap">
    <div class="stat-panel">
      <h4>COSMIC RECORDS</h4>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-lbl">LIFETIME ISO</div><div class="stat-val" id="st-iso">0</div></div>
        <div class="stat-item"><div class="stat-lbl">DAYS ELAPSED</div><div class="stat-val" id="st-days">0</div></div>
        <div class="stat-item"><div class="stat-lbl">SUPER NOVAS</div><div class="stat-val" id="st-novas">0</div></div>
        <div class="stat-item"><div class="stat-lbl">GHOSTS CAUGHT</div><div class="stat-val" id="st-ghosts">0</div></div>
        <div class="stat-item"><div class="stat-lbl">COLLAPSES</div><div class="stat-val" id="st-prestige">0</div></div>
        <div class="stat-item"><div class="stat-lbl">ISO/CYCLE</div><div class="stat-val" id="st-ips">0</div></div>
      </div>
    </div>

    <div class="stat-panel">
      <h4>SYSTEM LOG</h4>
      <div id="log-list"></div>
    </div>

    <div class="stat-panel">
      <h4>SAVE / EXPORT</h4>
      <div class="ctrl-row">
        <button class="ctrl-btn" onclick="exportSave()">EXPORT</button>
        <button class="ctrl-btn" onclick="importSave()">IMPORT</button>
      </div>
      <button class="ctrl-btn danger" style="width:100%" onclick="resetGame()">⚠ WIPE ALL DATA</button>
    </div>
  </div>
</div>

<script>
const SAVE_KEY = "VoidGod_ProV2";

// ── SKILL DEFINITIONS ──
const SKILLS = {
  // GEOLOGY
  tectonics: {
    name:"Tectonics", icon:"🪨", cat:"GEOLOGY",
    desc:"Stabilizes the planetary crust, forming solid ground.",
    baseCost:50, max:25, costScale:1.6,
    bonus: l => `+${l*3}% tile coverage`,
    effect: s => {}
  },
  atmosphere: {
    name:"Atmosphere", icon:"💨", cat:"GEOLOGY",
    desc:"Develops a breathable gas layer, warming the surface.",
    baseCost:300, max:20, costScale:1.65,
    req:{ tectonics:5 },
    bonus: l => `+${l*4}% ocean growth`,
    effect: s => {}
  },
  hydration: {
    name:"Hydration", icon:"🌊", cat:"GEOLOGY",
    desc:"Fills ocean basins with liquid water.",
    baseCost:2000, max:20, costScale:1.7,
    req:{ atmosphere:5 },
    bonus: l => `+${l*5}% bio growth`,
    effect: s => {}
  },
  biosphere: {
    name:"Biosphere", icon:"🌿", cat:"GEOLOGY",
    desc:"Spreads forests and complex life across the surface.",
    baseCost:10000, max:20, costScale:1.7,
    req:{ hydration:5 },
    bonus: l => `+${l*6}% city yield`,
    effect: s => {}
  },
  // CIVILIZATION
  civilization: {
    name:"Civilization", icon:"🏙️", cat:"CIVILIZATION",
    desc:"Constructs MegaCities that dramatically increase yields.",
    baseCost:60000, max:15, costScale:1.75,
    req:{ biosphere:5 },
    bonus: l => `+${l*500} base yield/cycle`,
    effect: s => {}
  },
  quantum: {
    name:"Quantum Core", icon:"⚛️", cat:"CIVILIZATION",
    desc:"Quantum computing multiplies civilization output.",

let state = {
  iso:0, void:0, day:1, planetName:"NEW WORLD",
  prestigeCount:0, skills:{}, voidSkills:{},
  milestones:{}, log:[],
  stats:{ totalIso:0, novas:0, ghosts:0, days:0, cycles:0 }
};

let autoTick=0, lastClick=0, logTimers=[], ipsBuffer=[], lastIso=0;

function init(){
  try{
    let s=localStorage.getItem(SAVE_KEY);
    if(s){ state=Object.assign({},state,JSON.parse(s)); }
    if(!state.stats) state.stats={totalIso:0,novas:0,ghosts:0,days:0,cycles:0};
    if(!state.milestones) state.milestones={};
    if(!state.log) state.log=[];
    if(!state.voidSkills) state.voidSkills={};
    if(state.iso===Infinity||isNaN(state.iso)||state.iso<0) state.iso=0;
  }catch(e){console.warn("Save load error:",e);}

  renderAll();
  setInterval(gameLoop,100);
  setInterval(autoSave,5000);
  setInterval(updateIPS,1000);
  addLog("SYSTEM ONLINE","good");
  tab('world');
}

// ── GAME LOOP ──
let tickAcc=0;
function gameLoop(){
  let sm=state.skills.sunMoon||0;
  if(sm<1){document.getElementById('auto-progress').style.background='conic-gradient(transparent 0%, transparent 0%)';return;}
  let ch=state.skills.chronos||0;
  let speedMult=1+ch*0.1;
  let secPerDay=Math.max(0.5,(15-sm)*0.85/speedMult);
  tickAcc+=0.1;
  let pct=Math.min(1,tickAcc/secPerDay);
  document.getElementById('auto-progress').style.background=
    `conic-gradient(var(--acc2) ${pct*360}deg, transparent 0%)`;
  if(tickAcc>=secPerDay){ advance(true); tickAcc=0; }

  // auto-collect ghosts
  if(state.voidSkills.voidMagnet){
    let g=document.querySelector('.tile-ghost');
    if(g) g.click();
  }
}

function updateIPS(){
  let cur=state.iso;
  let delta=Math.max(0,cur-lastIso);
  ipsBuffer.push(delta);
  if(ipsBuffer.length>5) ipsBuffer.shift();
  let ips=ipsBuffer.reduce((a,b)=>a+b,0)/ipsBuffer.length;
  document.getElementById('ips-display').innerText=fmt(ips)+"/s";
  lastIso=cur;
}

// ── ADVANCE ──
function advance(isAuto=false){
  let now=Date.now();
  if(!isAuto&&now-lastClick<80) return;
  lastClick=now;
  state.stats.days++;

  // Super Nova chance
  let novaMult=1+(state.skills.novaForge||0)*0.5;
  let novaChance=0.002*novaMult;
  if(Math.random()<novaChance) triggerNova();

  if(state.day<20){
    state.day++;
    if(state.day%5===0) renderGrid();
  } else {
    harvest();
    state.day=1;
    renderGrid();
  }
  updateUI();
  checkMilestones();
}

function harvest(){
  let base=100;
  let sk=state.skills;
  let civBonus=(sk.civilization||0)*500;
  let bioMult=1+(sk.biosphere||0)*0.06;
  let quantMult=1+(sk.quantum||0)*0.15;
  let dysonMult=sk.dyson?1.5:1;
  let singMult=1+(sk.singularity||0);
  let voidMult=1+(state.void*(state.voidSkills.darkMatter||0)*0.005);

  let total=(base+civBonus)*bioMult*quantMult*dysonMult*singMult*voidMult;
  total=Math.floor(total);
  state.iso+=total;
  state.stats.totalIso+=total;
  state.stats.cycles++;
  addLog(`Harvest: +${fmt(total)} ISO`,"highlight");
  notif(`+${fmt(total)} ISO`,"gold");

  // Void nexus bonus
  if(state.voidSkills.voidNexus && state.iso<50000) state.iso+=50000;
}

function calcHarvestEst(){
  let base=100;
  let sk=state.skills;
  let civBonus=(sk.civilization||0)*500;
  let bioMult=1+(sk.biosphere||0)*0.06;
  let quantMult=1+(sk.quantum||0)*0.15;
  let dysonMult=sk.dyson?1.5:1;
  let singMult=1+(sk.singularity||0);
  let voidMult=1+(state.void*(state.voidSkills.darkMatter||0)*0.005);
  return Math.floor((base+civBonus)*bioMult*quantMult*dysonMult*singMult*voidMult);
}

function triggerNova(){
  state.stats.novas++;
  let bonus=Math.floor((state.iso*0.05)+10000)*(1+(state.skills.novaForge||0));
  state.iso+=bonus; state.stats.totalIso+=bonus;
  addLog("✨ SUPER NOVA! +"+fmt(bonus)+" ISO","highlight");
  notif("✨ SUPER NOVA! +"+fmt(bonus),"gold");

  let flash=document.getElementById('flash');
  flash.style.background="radial-gradient(circle,rgba(192,132,252,0.4),rgba(251,191,36,0.2))";
  flash.style.animation="novaFlash 1s ease-out forwards";
  setTimeout(()=>{flash.style.animation="";},1100);
  spawnParticles();
}

function spawnParticles(){
  for(let i=0;i<20;i++){
    let p=document.createElement('div');
    let c=["#c084fc","#fbbf24","#22d3ee","#f43f5e"][Math.floor(Math.random()*4)];
    p.style.cssText=`position:fixed;left:50%;top:50%;width:3px;height:3px;border-radius:50%;background:${c};pointer-events:none;z-index:9000;`;
    document.body.appendChild(p);
    let a=Math.random()*Math.PI*2,d=80+Math.random()*120;
    p.animate([
      {transform:"translate(-50%,-50%)",opacity:1},
      {transform:`translate(calc(-50% + ${Math.cos(a)*d}px),calc(-50% + ${Math.sin(a)*d}px))`,opacity:0}
    ],{duration:700+Math.random()*400,easing:"ease-out"}).onfinish=()=>p.remove();
  }
}

// ── BUY SKILL ──
function buy(k){
  let now=Date.now();
  if(now-lastClick<80) return;
  lastClick=now;

  let sk=SKILLS[k], lvl=state.skills[k]||0;
  if(lvl>=sk.max) return;
  if(sk.req && !meetsReq(sk.req)) return;
  let cost=skillCost(k,lvl);
  if(state.iso<cost) return;
  state.iso-=cost;
  state.skills[k]=lvl+1;
  addLog(`Upgraded: ${sk.name} → Lv.${lvl+1}`);
  renderSkills(); renderGrid(); renderOrbit(); updateUI();
  save();
}

function meetsReq(req){
  for(let k in req){ if((state.skills[k]||0)<req[k]) return false; }
  return true;
}

function skillCost(k,lvl){ return Math.floor(SKILLS[k].baseCost*Math.pow(SKILLS[k].costScale,lvl)); }

// ── PRESTIGE ──
function prestige(){
  let tokens=pendingTokens();
  if(tokens<1){ alert("Need at least 1M ISO to collapse!"); return; }
  if(!confirm(`Collapse reality and gain ${tokens} VOID tokens?\n\nAll ISO and skills will be reset.`)) return;
  
  let newName=prompt("Name the next universe:", state.planetName) || state.planetName;

  // Soul Bind: keep 10% of skills
  let keptSkills={};
  if(state.voidSkills.soulBind){
    for(let k in state.skills){
      keptSkills[k]=Math.floor((state.skills[k]||0)*0.1);
    }
  }

  state.void+=tokens;
  state.prestigeCount++;
  state.iso=0;
  state.day=1;
  state.skills=keptSkills;
  state.planetName=newName.toUpperCase();
  addLog(`Reality collapsed. Void: ${state.void}`,"highlight");
  save();
  renderAll();
  tab('world');
}

function pendingTokens(){ return Math.floor(Math.sqrt(state.iso/1000000)); }

// ── BUY VOID ──
function buyVoid(k){
  let v=VOID_UPGRADES[k], lvl=state.voidSkills[k]||0;
  if(lvl>=v.max) return;
  let cost=v.cost*(lvl+1);
  if(state.void<cost) return;
  state.void-=cost;
  state.voidSkills[k]=lvl+1;
  addLog(`Void Upgrade: ${v.name}`,"highlight");
  renderVoid(); updateUI(); save();
}

// ── PLANET CANVAS ──
function renderPlanet(){
  let c=document.getElementById('planet-canvas');
  if(!c) return;
  let ctx=c.getContext('2d');
  let w=200,h=200;
  ctx.clearRect(0,0,w,h);

  // detect env
  let env=detectEnv();
  let rgb=env.planet;

  // base gradient
  let grad=ctx.createRadialGradient(70,60,10,100,100,100);
  grad.addColorStop(0,`rgba(${rgb[0]+40},${rgb[1]+40},${rgb[2]+40},1)`);
  grad.addColorStop(0.6,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},1)`);
  grad.addColorStop(1,`rgba(${Math.max(0,rgb[0]-30)},${Math.max(0,rgb[1]-30)},${Math.max(0,rgb[2]-30)},1)`);
  ctx.beginPath(); ctx.arc(100,100,98,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();

  // surface features
  let sk=state.skills;
  // tectonic plates
  if(sk.tectonics>0){
    ctx.globalAlpha=Math.min(0.8,(sk.tectonics/25));
    for(let i=0;i<8;i++){
      let x=20+Math.sin(i*1.3)*70,y=20+Math.cos(i*0.9)*70;
      ctx.beginPath();
      ctx.arc(80+x*0.4,80+y*0.4,15+i*3,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${rgb[0]+60},${rgb[1]+60},${rgb[2]+60},0.3)`;
      ctx.lineWidth=1.5;ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  // oceans
  if(sk.hydration>0){
    ctx.globalAlpha=Math.min(0.6,sk.hydration*0.04);
    let oGrad=ctx.createRadialGradient(90,110,5,100,100,60);
    oGrad.addColorStop(0,"rgba(30,120,255,0.8)");
    oGrad.addColorStop(1,"rgba(10,50,150,0.3)");
    ctx.beginPath();ctx.ellipse(100,115,55,35,0.3,0,Math.PI*2);
    ctx.fillStyle=oGrad;ctx.fill();
    ctx.globalAlpha=1;
  }
  // landmasses
  if(sk.biosphere>0){
    ctx.globalAlpha=Math.min(0.7,sk.biosphere*0.05);
    ctx.fillStyle=`rgba(30,${100+rgb[1]*0.3},40,0.9)`;
    ctx.beginPath();ctx.ellipse(80,85,30,20,-0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(130,120,20,15,0.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // cities (lights)
  if(sk.civilization>0){
    let cityN=sk.civilization*3;
    ctx.globalAlpha=0.8;
    for(let i=0;i<cityN;i++){
      let a=i*(Math.PI*2/cityN), r=40+Math.sin(i*2.3)*20;
      let cx=100+Math.cos(a)*r, cy=100+Math.sin(a)*r;
      ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);
      ctx.fillStyle="rgba(251,191,36,0.9)";ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // atmosphere glow
  if(sk.atmosphere>0){
    let atmoGrad=ctx.createRadialGradient(100,100,95,100,100,100);
    atmoGrad.addColorStop(0,"transparent");
    atmoGrad.addColorStop(0.85,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
    atmoGrad.addColorStop(1,`rgba(${rgb[0]+30},${rgb[1]+30},${rgb[2]+30},${Math.min(0.4,sk.atmosphere*0.02)})`);
    ctx.beginPath();ctx.arc(100,100,100,0,Math.PI*2);
    ctx.fillStyle=atmoGrad;ctx.fill();
  }
  // specular
  let spec=ctx.createRadialGradient(65,55,2,75,65,50);
  spec.addColorStop(0,"rgba(255,255,255,0.2)");
  spec.addColorStop(1,"transparent");
  ctx.fillStyle=spec;ctx.fill();
  ctx.beginPath();ctx.arc(100,100,98,0,Math.PI*2);ctx.fillStyle=spec;ctx.fill();

  // border
  ctx.beginPath();ctx.arc(100,100,98,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;ctx.stroke();
}

function renderOrbit(){
  let orbitEl=document.getElementById('orbit-rings');
  orbitEl.innerHTML='';
  let env=detectEnv();
  let color=env.color;

  if(state.skills.dyson){
    // Dyson ring
    let ring=document.createElement('div');
    ring.className='orbit-ring';
    ring.style.cssText=`inset:-30px;border-color:rgba(251,191,36,0.3);animation-duration:15s;`;
    let sat=document.createElement('div');
    sat.className='sat-dot';
    sat.style.cssText=`width:8px;height:8px;background:#fbbf24;box-shadow:0 0 10px #fbbf24;top:-4px;left:calc(50% - 4px);`;
    ring.appendChild(sat);
    orbitEl.appendChild(ring);
  }
  if(state.skills.chronos>0){
    let ring2=document.createElement('div');
    ring2.className='orbit-ring';
    ring2.style.cssText=`inset:-15px;border-color:${color}33;animation-duration:8s;animation-direction:reverse;`;
    orbitEl.appendChild(ring2);
  }
}

// ── GRID ──
function renderGrid(){
  let g=document.getElementById('grid'); g.innerHTML='';
  let sk=state.skills;
  let ghostChance=state.voidSkills.spectralLens?0.06:0.012;
  let ghostIdx=(state.prestigeCount>0&&Math.random()<ghostChance)?Math.floor(Math.random()*81):-1;

  for(let i=0;i<81;i++){
    let d=document.createElement('div');
    if(i===ghostIdx){
      d.className='tile tile-ghost';
      d.title="👻 Spectral ISO Cache!";
      d.onclick=()=>{
        let gain=(state.prestigeCount+1)*5000*(1+(state.void*0.1));
        state.iso+=Math.floor(gain);
        state.stats.ghosts++;
        notif("👻 Ghost! +"+fmt(gain)+" ISO","purple");
        addLog("Ghost captured: +"+fmt(gain)+" ISO","highlight");
        renderGrid();updateUI();save();
      };
    } else {
      let cls='tile tile-void';
      if(sk.civilization && i<(sk.civilization)*6) cls='tile tile-city';
      else if(sk.biosphere && i<(sk.biosphere)*10) cls='tile tile-grass';
      else if(sk.hydration && i<(sk.hydration)*14) cls='tile tile-ocean';
      else if(sk.atmosphere && i<(sk.atmosphere)*18) cls='tile tile-fire';
      else if(sk.tectonics && i<(sk.tectonics)*22) cls='tile tile-rock';
      d.className=cls;
    }
    g.appendChild(d);
  }
}

// ── RENDER SKILLS ──
function renderSkills(){
  let cats={};
  Object.keys(SKILLS).forEach(k=>{
    let s=SKILLS[k];
    if(!cats[s.cat]) cats[s.cat]=[];
    cats[s.cat].push(k);
  });

  let html='';
  Object.keys(cats).forEach(cat=>{
    html+=`<div class="skill-category"><div class="skill-cat-title">${cat}</div><div class="skill-grid">`;
    cats[cat].forEach(k=>{
      let s=SKILLS[k];
      let lvl=state.skills[k]||0;
      let isMax=lvl>=s.max;
      let locked=s.req&&!meetsReq(s.req)&&lvl===0;
      let cost=isMax?0:skillCost(k,lvl);
      let canBuy=!isMax&&!locked&&state.iso>=cost;
      let cls='skill-card'+(canBuy?' can-buy':'')+(isMax?' maxed':'')+(locked?' locked':'');
      let costStr=isMax?'MAXED':locked?'LOCKED':fmt(cost)+' ISO';
      let costCls=isMax?'maxed':(!isMax&&state.iso<cost&&!locked)?'cant':'';
      let barPct=isMax?100:Math.floor((lvl/s.max)*100);
      html+=`<div class="${cls}" onclick="${canBuy?`buy('${k}')`:''}" title="${locked&&s.req?'Requires: '+Object.keys(s.req).map(r=>SKILLS[r].name+' Lv.'+s.req[r]).join(', '):''}">
        <span class="sk-icon">${s.icon}</span>
        <div class="sk-header">
          <span class="sk-name">${s.name}</span>
          <span class="sk-lvl ${isMax?'max':''}">${isMax?'MAX':lvl+'/'+s.max}</span>
        </div>
        <div class="sk-desc">${s.desc}</div>
        <div class="sk-bar"><div class="sk-bar-fill" style="width:${barPct}%"></div></div>
        <div class="sk-cost ${costCls}">${costStr}</div>
        ${lvl>0?`<div class="sk-bonus">${s.bonus(lvl)}</div>`:''}
      </div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('skilltree-wrap').innerHTML=html;
}

    </button>
    <div style="font-size:9px;color:var(--txt3);margin-top:8px;">Requires 1,000,000 ISO to collapse reality</div>

      </button>
    </div>`;
  });

  document.getElementById('void-screen-wrap').innerHTML=html;

// ── UI UPDATE ──
function updateUI(){
  // cap
  if(state.iso>1e18) state.iso=1e18;

  document.getElementById('iso-disp').innerText=fmt(state.iso);
  document.getElementById('void-disp').innerText=state.void;
  document.getElementById('day-num').innerText=state.day;
  document.getElementById('harvest-est').innerText=fmt(calcHarvestEst());

  let env=detectEnv();
  document.getElementById('planet-name').innerText=state.planetName;
  document.getElementById('planet-name').style.color=env.color;
  document.getElementById('planet-name').style.textShadow=`0 0 20px ${env.color}44`;
  document.getElementById('env-line').innerText=`STATUS: ${env.desc} — DAY ${state.day}/20`;

  // stats
  document.getElementById('st-iso').innerText=fmt(state.stats.totalIso);
  document.getElementById('st-days').innerText=state.stats.days.toLocaleString();
  document.getElementById('st-novas').innerText=state.stats.novas;
  document.getElementById('st-ghosts').innerText=state.stats.ghosts;
  document.getElementById('st-prestige').innerText=state.prestigeCount;
  document.getElementById('st-ips').innerText=fmt(calcHarvestEst());

  renderPlanet();
}

function detectEnv(){
  let n=state.planetName.toLowerCase();
  if(n.includes("void")||n.includes("dark")) return ENVS.void;
  if(n.includes("fire")||n.includes("hell")||n.includes("inferno")) return ENVS.fire;
  if(n.includes("ice")||n.includes("snow")||n.includes("frost")) return ENVS.ice;
  if(n.includes("ocean")||n.includes("water")||n.includes("aqua")) return ENVS.ocean;
  if(n.includes("cyber")||n.includes("digital")||n.includes("neon")) return ENVS.cyber;
  if((state.skills.biosphere||0)>5) return ENVS.earth;
  return ENVS.default;
}

// ── LOG ──
let logStore=[];
function addLog(msg,type=""){
  let time=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logStore.unshift({msg,type,time});
  if(logStore.length>30) logStore.pop();
  renderLog();
}

function renderLog(){
  let html=logStore.slice(0,20).map(e=>`
    <div class="log-entry">
      <span class="log-time">${e.time}</span>
      <span class="log-msg ${e.type?'log-'+e.type:''}">${e.msg}</span>
    </div>`).join('');
  let el=document.getElementById('log-list');
  if(el) el.innerHTML=html;
}

// ── NOTIFICATIONS ──
function notif(msg,color="purple"){
  let c={gold:"#fbbf24",purple:"#c084fc",green:"#4ade80",red:"#f43f5e"}[color]||"#c084fc";
  let n=document.createElement('div');
  n.className='notif';
  n.style.color=c;n.style.borderColor=c+'55';
  n.innerText=msg;
  document.getElementById('notif-wrap').appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

// ── MILESTONES ──
function checkMilestones(){
  MILESTONES.forEach(m=>{
    if(!state.milestones[m.id]&&state.stats.totalIso>=m.iso){
      state.milestones[m.id]=true;
      showMilestone(m.msg);
    }
  });
}

function showMilestone(msg){
  let b=document.getElementById('milestone-banner');
  b.innerText="✦ "+msg.toUpperCase()+" ✦";
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),3500);
  addLog("🏆 "+msg,"highlight");
}

// ── TABS ──
function tab(t){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-'+t).classList.add('on');
  document.getElementById('nt-'+t).classList.add('on');
  if(t==='skills') renderSkills();
  if(t==='void') renderVoid();
  if(t==='stats') renderLog();
}

// ── SAVE / LOAD ──
function save(){
  localStorage.setItem(SAVE_KEY,JSON.stringify(state));
  let d=document.getElementById('save-dot');
  d.classList.add('pulse');
  setTimeout(()=>d.classList.remove('pulse'),600);
}

function autoSave(){ save(); }

function renamePlanet(){
  let n=prompt("Name this reality:",state.planetName);
  if(n&&n.trim()){ state.planetName=n.trim().toUpperCase(); updateUI(); save(); }
}

function exportSave(){
  let code=btoa(JSON.stringify(state));
  navigator.clipboard.writeText(code).then(()=>alert("Save exported to clipboard!")).catch(()=>{
    prompt("Copy your save code:",code);
  });
}

function importSave(){
  let s=prompt("Paste save code:");
  if(s){
    try{
      state=JSON.parse(atob(s.trim()));
      save(); location.reload();
    }catch(e){ alert("Invalid save code!"); }
  }
}

function resetGame(){
  if(confirm("DELETE ALL PROGRESS? This is permanent.")) {
    if(confirm("Are you absolutely sure? All void tokens, skills, and data will be lost.")){
      localStorage.removeItem(SAVE_KEY);location.reload();
    }
  }
}

// ── FORMATTING ──
function fmt(n){
  if(n===undefined||n===null||isNaN(n)) return "0";
  if(n>=1e15) return (n/1e15).toFixed(2)+"Qa";
  if(n>=1e12) return (n/1e12).toFixed(2)+"T";
  if(n>=1e9)  return (n/1e9).toFixed(2)+"B";
  if(n>=1e6)  return (n/1e6).toFixed(2)+"M";
  if(n>=1e3)  return (n/1e3).toFixed(1)+"K";
  return Math.floor(n).toLocaleString();
}

// ── RENDER ALL ──
function renderAll(){
  renderPlanet(); renderOrbit(); renderGrid(); updateUI();
}

init();
</script>
