<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VOID GOD \u2014 IMMORTAL EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --c0: #02010a;
  --c1: #0c0a1e;
  --c2: #181430;
  --c3: #251e4a;
  --acc: #c084fc;
  --acc2: #818cf8;
  --gold: #fbbf24;
  --cyan: #22d3ee;
  --red: #f43f5e;
  --green: #4ade80;
  --txt: #e2e8f0;
  --txt2: #94a3b8;
  --txt3: #475569;
  --glow: rgba(192,132,252,0.4);
  --glow2: rgba(34,211,238,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--c0);color:var(--txt);
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(129,140,248,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%, rgba(192,132,252,0.07) 0%, transparent 60%);
}

/* NOISE OVERLAY */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1;opacity:0.35;
}

/* \u2500\u2500 HEADER \u2500\u2500 */
#hdr{
  position:sticky;top:0;z-index:500;
  background:rgba(2,1,10,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(192,132,252,0.2);
  padding:0 16px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
#hdr-title{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:11px;
  letter-spacing:3px;color:var(--acc);
  text-shadow:0 0 20px var(--acc);
}
#res-row{display:flex;gap:16px;align-items:center;}
.res{display:flex;align-items:center;gap:6px;font-size:11px;}
.res-icon{width:8px;height:8px;border-radius:50%;}
.ri-iso{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.ri-void{background:var(--acc);box-shadow:0 0 8px var(--acc);}
.res-val{color:var(--txt);font-weight:bold;}
#ips-display{font-size:9px;color:var(--txt3);}
#save-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);transition:0.3s;}
#save-dot.pulse{background:var(--green);box-shadow:0 0 8px var(--green);}

/* \u2500\u2500 NAV \u2500\u2500 */
#nav{
  display:flex;background:rgba(12,10,30,0.9);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;top:52px;z-index:499;
}
.ntab{
  flex:1;padding:10px 4px;font-size:10px;letter-spacing:1.5px;
  color:var(--txt3);background:none;border:none;cursor:pointer;
  font-family:'Share Tech Mono',monospace;text-transform:uppercase;
  border-bottom:2px solid transparent;transition:0.2s;
}
.ntab:hover{color:var(--txt2);}
.ntab.on{color:var(--acc);border-bottom-color:var(--acc);text-shadow:0 0 12px var(--acc);}
.ntab .ntab-icon{font-size:14px;display:block;margin-bottom:2px;}

/* \u2500\u2500 SCREENS \u2500\u2500 */
.screen{display:none;padding:16px;padding-bottom:120px;animation:fadeUp 0.25s ease;}
.screen.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* \u2500\u2500 WORLD SCREEN \u2500\u2500 */
#planet-name{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;
  letter-spacing:4px;text-align:center;
  cursor:pointer;margin-bottom:4px;transition:0.3s;
}
#env-line{text-align:center;font-size:9px;color:var(--txt3);letter-spacing:2px;margin-bottom:20px;}

/* PLANET VISUAL */
#planet-wrap{
  position:relative;width:200px;height:200px;margin:0 auto 24px;
}
#planet-svg{width:200px;height:200px;border-radius:50%;overflow:hidden;position:relative;z-index:2;}
#planet-glow{
  position:absolute;inset:-20px;border-radius:50%;z-index:1;
  background:radial-gradient(circle, transparent 35%, rgba(192,132,252,0.15) 60%, transparent 80%);
  animation:glowPulse 3s ease-in-out infinite alternate;
}
@keyframes glowPulse{from{opacity:0.6;}to{opacity:1;}}
.orbit-ring{
  position:absolute;border-radius:50%;border:1px dashed;
  animation:spinOrbit linear infinite;pointer-events:none;
}
.sat-dot{
  position:absolute;top:50%;left:50%;width:6px;height:6px;
  border-radius:50%;transform-origin:center center;
}
@keyframes spinOrbit{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* GRID */
#grid-wrap{
  position:relative;width:288px;margin:0 auto;
}
#grid{
  display:grid;grid-template-columns:repeat(9,1fr);
  gap:2px;width:288px;padding:4px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(192,132,252,0.15);
  border-radius:8px;
}
.tile{
  width:29px;height:29px;border-radius:3px;
  background:rgba(255,255,255,0.02);transition:0.3s;
  position:relative;
}
.tile-void{background:rgba(138,43,226,0.12);}
.tile-rock{background:linear-gradient(135deg,#3d3550,#2a1f40);}
.tile-fire{background:linear-gradient(135deg,#7c1d1d,#c2410c);}
.tile-ocean{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);}
.tile-grass{background:linear-gradient(135deg,#14532d,#166534);}
.tile-city{
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  box-shadow:inset 0 0 4px rgba(192,132,252,0.3);
}
.tile-city::after{
  content:'';position:absolute;bottom:2px;left:2px;right:2px;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  opacity:0.5;animation:cityGlow 2s ease infinite alternate;
}
@keyframes cityGlow{from{opacity:0.2;}to{opacity:0.7;}}
.tile-ghost{
  background:radial-gradient(circle,rgba(192,132,252,0.6),rgba(192,132,252,0.1)) !important;
  cursor:pointer;z-index:10;animation:ghostBeat 0.8s ease-in-out infinite alternate;
}
@keyframes ghostBeat{from{box-shadow:0 0 6px var(--acc);transform:scale(0.85);}to{box-shadow:0 0 16px var(--acc),0 0 30px rgba(192,132,252,0.4);transform:scale(1.1);}}

/* DAY BUTTON */
#day-btn-wrap{text-align:center;margin-top:20px;}
#day-btn{
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #1e1640, #0c0a1e);
  border:2px solid rgba(192,132,252,0.5);
  color:var(--txt);cursor:pointer;position:relative;
  font-family:'Orbitron
